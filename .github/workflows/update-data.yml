name: Update EMBI Data

on:
  schedule:
    # Evitar el minuto 00: GitHub puede retrasar o descartar schedules
    # cuando hay mucha carga al inicio de cada hora.
    - cron: '17 10,11,12 * * *'
      timezone: "America/New_York"
  workflow_dispatch: # Permite ejecutar manualmente

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Sync with origin
      run: |
        git pull --rebase origin main
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        pip install pandas openpyxl
        
    - name: Download and process data
      run: |
        python convert_data.py
        
    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add data.json
        if git diff --staged --quiet; then
          echo "No new data found; later scheduled runs will try again."
        else
          git commit -m "Auto-update EMBI data"
          git push
        fi
